name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Standard builds ──
          - name: Linux x86_64
            target: x86_64-linux
            os: ubuntu-latest
            test: true
            simd: true
          - name: Linux aarch64
            target: aarch64-linux
            os: ubuntu-latest
            test: false
            simd: true
          - name: Windows x86_64
            target: x86_64-windows-msvc
            os: windows-latest
            test: true
            simd: true
          - name: Windows aarch64
            target: aarch64-windows-msvc
            os: windows-latest
            test: false
            simd: true
          - name: macOS ARM64
            target: aarch64-macos
            os: macos-latest
            test: true
            simd: true

          # ── CUDA Variants ──
          - name: Linux x86_64 CUDA
            target: x86_64-linux
            os: ubuntu-latest
            test: false
            cuda: true
            simd: true
          - name: Windows x86_64 CUDA
            target: x86_64-windows-msvc
            os: windows-latest
            test: false
            cuda: true
            simd: true

          # ── Vulkan Variants ──
          - name: Linux x86_64 Vulkan
            target: x86_64-linux
            os: ubuntu-latest
            test: false
            vulkan: true
            simd: true
          - name: Windows x86_64 Vulkan
            target: x86_64-windows-msvc
            os: windows-latest
            test: false
            vulkan: true
            simd: true

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      # ── NASM for x86_64 SIMD builds ──
      - name: Install NASM (Linux)
        if: matrix.simd && contains(matrix.target, 'x86_64') && runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Install NASM (Windows)
        if: matrix.simd && contains(matrix.target, 'x86_64') && runner.os == 'Windows'
        run: choco install nasm -y
        shell: pwsh

      - name: Install NASM (macOS)
        if: matrix.simd && contains(matrix.target, 'x86_64') && runner.os == 'macOS'
        run: brew install nasm

      # ── Platform SDK setup ──
      - name: Set SDKROOT (macOS)
        if: runner.os == 'macOS'
        run: echo "SDKROOT=$(xcrun --show-sdk-path)" >> $GITHUB_ENV

      - name: Setup MSVC (Windows CUDA)
        if: matrix.cuda && runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # ── CUDA setup (minimal install to avoid disk space issues) ──
      - name: Setup CUDA
        if: matrix.cuda
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.4.0'
          method: network
          sub-packages: '["cudart", "nvcc", "cublas", "cublas_dev", "cuda_cudart", "cuda_nvcc"]'

      # ── Vulkan setup ──
      - name: Setup Vulkan (Linux)
        if: matrix.vulkan && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev vulkan-tools
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Setup Vulkan (Windows)
        if: matrix.vulkan && runner.os == 'Windows'
        run: |
          $url = "https://sdk.lunarg.com/sdk/download/1.3.250.0/windows/VulkanSDK-1.3.250.0-Installer.exe"
          $output = "vulkan-sdk.exe"
          
          $webClient = New-Object System.Net.WebClient
          $webClient.DownloadFile($url, $output)
          
          Start-Process -FilePath ".\$output" -ArgumentList "--accept-licenses", "--default-answer", "--confirm-command", "install" -Wait -NoNewWindow
          
          echo "VULKAN_SDK=C:\VulkanSDK\1.3.250.0" >> $env:GITHUB_ENV
        shell: pwsh

      # ── Build ──
      - name: Build
        run: |
          ZIG_FLAGS="-Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}"
          if [[ "${{ matrix.cuda }}" == "true" ]]; then ZIG_FLAGS="$ZIG_FLAGS -Dcuda=true"; fi
          if [[ "${{ matrix.vulkan }}" == "true" ]]; then ZIG_FLAGS="$ZIG_FLAGS -Dvulkan=true"; fi
          if [[ "${{ matrix.simd }}" == "true" ]]; then ZIG_FLAGS="$ZIG_FLAGS -Dsimd-backend=true"; fi
          zig build $ZIG_FLAGS
        shell: bash

      - name: Test
        if: matrix.test
        run: zig build test -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

      # ── Packaging ──
      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          BIN="zig-out/bin/MLz"
          chmod +x "$BIN" || true
          
          SUFFIX=""
          if [[ "${{ matrix.cuda }}" == "true" ]]; then SUFFIX="-cuda"; fi
          if [[ "${{ matrix.vulkan }}" == "true" ]]; then SUFFIX="-vulkan"; fi
          
          OUT="dist/MLz-${{ matrix.target }}${SUFFIX}.tar.gz"
          tar -C "$(dirname "$BIN")" -czf "$OUT" "$(basename "$BIN")"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $bin = "zig-out/bin/MLz.exe"
          
          $suffix = ""
          if ("${{ matrix.cuda }}" -eq "true") { $suffix = "-cuda" }
          if ("${{ matrix.vulkan }}" -eq "true") { $suffix = "-vulkan" }
          
          $out = "dist/MLz-${{ matrix.target }}$suffix.zip"
          Compress-Archive -Path $bin -DestinationPath $out -Force

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
